<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lanyard Order</title>
    <link rel="stylesheet" href="MAIN.css">
</head>

<body>

<header class="order-navbar">
    <a href="lanyard.html" class="back-btn">
        <span class="arrow">&larr;</span>
    </a>

    <div class="header-text">
        <h1 class="main-title">WMSU Lanyard Design</h1>
        <p class="sub-title">UPRESSease - WMSU</p>
    </div>
</header>

<section class="order-section">

    <!-- LEFT SIDE -->
    <div class="order-card">
        <img src="images/lanyard1.png">
        <h3>WMSU Official Lanyard</h3>
        <p class="price">₱120.00</p>
        <button class="btn-red">Confirm Order</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="order-card">
        <h3>Customize Your Lanyard</h3>

        <label class="upload-box">
            Upload File
            <input type="file">
        </label>

        <p class="price">₱150.00</p>
        <button class="btn-red">Confirm Order</button>
    </div>

</section>

</body>
</html>
