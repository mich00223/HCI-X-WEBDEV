<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload & Print Preview</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    color: white;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.upload-box {
    border: 2px dashed rgba(255,255,255,0.6);
    padding: 30px;
    border-radius: 15px;
    cursor: pointer;
    display: block;
    margin: 20px 0;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #764ba2;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Upload File</h2>

    <label class="upload-box" for="fileInput">
        Click to Upload File
    </label>
    <input type="file" id="fileInput" accept="image/*,.pdf" hidden>

    <button>Print</button>
</div>

</body>
</html>
