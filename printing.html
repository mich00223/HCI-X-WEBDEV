<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printing Order</title>
  <link rel="stylesheet" href="MAIN.css">
</head>

<body>

<div class="container">

  <h1 class="main-title">Printing Order</h1>
  <p class="sub-title">UPRESSease - WMSU</p>

  <h2 class="section-title">Upload File</h2>

  <form action="#" method="post" enctype="multipart/form-data">

    <label class="upload-box">
      Click to Upload File
      <input type="file" name="file" accept="image/*" required>
    </label>

    <div class="preview">
      <p class="preview-text">
        Preview will appear after selecting image (browser depe ndent).
      </p>
    </div>

    <button type="submit">
      Confirm & Print
    </button>

  </form>

</div>

</body>
</html>
